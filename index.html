<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#081526" />
    <title>给我最喜欢的你</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <div class="sky-sea" aria-hidden="true">
        <div class="stars"></div>
        <div class="shooting-star shooting-star-one"></div>
        <div class="shooting-star shooting-star-two"></div>
        <div class="sea">
          <div class="moon-road"></div>
          <div class="wave wave-one"></div>
          <div class="wave wave-two"></div>
          <div class="wave wave-three"></div>
        </div>
      </div>

      <section class="letter" aria-live="polite">
        <!-- 标题文字：可以在这里改成你想说的第一句话 -->
        <h1>给我最喜欢的你</h1>

        <button class="love-button" id="loveButton" type="button">
          点我一下
        </button>

        <p class="message" id="message"></p>
      </section>

      <div class="heart-layer" id="heartLayer" aria-hidden="true"></div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
